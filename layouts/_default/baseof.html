<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;600;700&family=Metropolis:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <header style="padding: var(--space-md) 0; border-bottom: 1px solid var(--color-outline-variant); position: sticky; top: 0; background: var(--color-background); z-index: 1000;">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: var(--space-sm);">
      <a href="/" style="text-decoration: none; font-family: 'Libre Caslon Text', serif; font-size: 24px; font-weight: 700; color: var(--color-primary);">
        {{ .Site.Title }}
      </a>
      <nav>
        <ul style="list-style: none; display: flex; gap: var(--space-md); flex-wrap: wrap; justify-content: center;">
          {{ range .Site.Params.mainSections }}
            <li><a href="/{{ . }}" class="nav-link">{{ . | humanize }}</a></li>
          {{ end }}
        </ul>
      </nav>
    </div>
  </header>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer style="background-color: var(--color-tertiary); color: var(--color-on-tertiary); padding: var(--space-lg) 0; margin-top: var(--space-xl);">
    <div class="container" style="text-align: center; font-family: 'Metropolis', sans-serif; font-size: 14px;">
      <p>&copy; {{ now.Format "2006" }} {{ .Site.Title }}. Cultivando la tranquilidad urbana.</p>
    </div>
  </footer>
</body>
</html>
