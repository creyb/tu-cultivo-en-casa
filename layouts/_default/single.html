{{ define "main" }}
<div class="container" style="padding: var(--space-xl) 0;">
  <header style="margin-bottom: var(--space-lg);">
    <h1 style="font-size: 32px; line-height: 1.2; margin-bottom: var(--space-sm);">{{ .Title }}</h1>
    <div style="display: flex; gap: var(--space-sm); align-items: center; font-family: 'Metropolis', sans-serif; font-size: 12px; color: var(--color-on-surface-variant);">
      <span>{{ .Date.Format "January 2, 2006" }}</span>
      <span>•</span>
      {{ range .Params.categoria }}<span class="chip">{{ . }}</span>{{ end }}
    </div>
  </header>
  
  <article style="max-width: 720px; margin: 0 auto; font-family: 'Metropolis', sans-serif; font-size: 18px; line-height: 1.6; color: var(--color-on-surface);">
    {{ if .Params.image }}
      <img src="{{ .Params.image }}" alt="{{ .Title }}" style="width: 100%; border-radius: var(--radius-lg); margin-bottom: var(--space-lg);">
    {{ end }}
    <div class="content">
      {{ .Content }}
    </div>
  </article>
</div>
{{ end }}
